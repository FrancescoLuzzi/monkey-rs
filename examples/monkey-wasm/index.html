<!DOCTYPE html>
<html lang="en-US">

<head>
  <meta charset="utf-8" />
  <title>Monkey evaluator</title>
  <style type="text/css">
    body {
      font-family: sans-serif;
    }

    textarea {
      width: calc(100% - 20px);
      height: 20em;
      box-sizing: border-box;
      margin: 5px;
      border-radius: 3px;
      padding: 5px;
      border-color: lightgray;
    }
  </style>
</head>

<body>
  <script type="module">
    import init, { MonkeyStateBuilder } from "./pkg/monkey_wasm.js";
    async function run() {
      await init();
      const stateBuilder = new MonkeyStateBuilder();
      stateBuilder.registerFunction("js_upper", (value) => String(value).toUpperCase());
      stateBuilder.registerFunction("js_sum", (...values) =>
        values.reduce((sum, value) => sum + Number(value), 0),
      );
      stateBuilder.registerFunction("greeter", (name) => `hello ${name} from js`);
      const state = stateBuilder.build()

      function evaluate() {
        const input = document.getElementById("input").value;
        const output = document.getElementById("output");
        try {
          const result = state.eval(input);
          output.value = result;
        } catch (e) {
          output.value = e.toString();
        }
      }
      document
        .getElementById("run")
        .addEventListener("click", evaluate, false);
    }
    run();
  </script>
  <h1>Monkey evaluator</h1>
  <p>
    Using
    <a href="https://github.com/FrancescoLuzzi/monkey-rs">monkey-rs</a>
    compiled to web assembly.
  </p>
  <textarea id="input">
let total = js_sum(1, 2, 3, 4);
let message = greeter(js_upper("friend"));
message + " total=" + total
    </textarea>
  <textarea id="output" readonly="readonly" style="background-color: lightgray">
    </textarea>
  <button id="run">Run</button>
</body>

</html>
